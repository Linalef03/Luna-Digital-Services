{% extends "base1.html" %}

{% block title %}Delete Service{% endblock %}

{% block content %}

<div class="flex justify-center items-start min-h-[60vh] p-6">

    <div class="w-full max-w-md bg-white shadow-xl rounded-2xl p-8">

        <!-- Page Title -->
        <h1 class="text-3xl font-bold text-gray-800 mb-4 text-center">
            Delete Service
        </h1>

        <!-- Confirmation Text -->
        <p class="text-gray-700 mb-6 text-center">
            Are you sure you want to delete the service: <span class="font-semibold">{{ service.name }}</span>?
        </p>

        <!-- Form -->
        <form method="post" class="flex flex-col gap-4">
            {% csrf_token %}
            <button type="submit"
                    class="w-full bg-red-600 text-white font-semibold py-3 rounded-lg shadow hover:bg-red-700 transition">
                Delete
            </button>
            <a href="{% url 'services:service_list' %}"
               class="w-full text-center bg-gray-400 text-white font-semibold py-3 rounded-lg shadow hover:bg-gray-500 transition">
                Cancel
            </a>
        </form>

    </div>
</div>

{% endblock %}
