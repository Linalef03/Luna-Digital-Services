{% extends "base1.html" %}

{% block title %}Complete Order{% endblock %}

{% block content %}

<div class="flex justify-center items-start min-h-[60vh] p-6">

    <div class="w-full max-w-md bg-white shadow-xl rounded-2xl p-8">

        <!-- Page Title -->
        <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">
            Complete Order #{{ order.id }}
        </h1>

        <!-- Form -->
        <form method="post" enctype="multipart/form-data" class="space-y-5">
            {% csrf_token %}

            <!-- File Upload -->
            <div>
                <label class="block text-gray-700 font-medium mb-2">Upload Final Files</label>
                <input type="file" name="final_file"
                       class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <!-- Submit Button -->
            <button type="submit"
                    class="w-full bg-red-600 text-white font-semibold py-3 rounded-lg shadow hover:bg-red-700 transition">
                Confirm Completion
            </button>
        </form>

    </div>
</div>

{% endblock %}
