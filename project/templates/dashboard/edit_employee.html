{% extends "base1.html" %}

{% block title %}Edit Employee{% endblock %}

{% block content %}

<div class="flex justify-center items-start min-h-[70vh] p-6">

    <div class="w-full max-w-lg bg-white shadow-xl rounded-2xl p-8">

        <!-- Page Title -->
        <h2 class="text-3xl font-bold text-gray-800 mb-6 text-center">Edit Employee</h2>

        <!-- Form -->
        <form method="POST" class="space-y-5">
            {% csrf_token %}

            <!-- Username -->
            <div>
                <label class="block text-gray-700 font-medium mb-1">Username</label>
                <input type="text" name="username" value="{{ employee.user.username }}"
                       class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <!-- Email -->
            <div>
                <label class="block text-gray-700 font-medium mb-1">Email</label>
                <input type="email" name="email" value="{{ employee.user.email }}"
                       class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <!-- Password -->
            <div>
                <label class="block text-gray-700 font-medium mb-1">New Password (Optional)</label>
                <input type="password" name="password" placeholder="Leave blank to keep current password"
                       class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <!-- Phone -->
            <div>
                <label class="block text-gray-700 font-medium mb-1">Phone</label>
                <input type="text" name="phone" value="{{ employee.phone }}"
                       class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <!-- Address -->
            <div>
                <label class="block text-gray-700 font-medium mb-1">Address</label>
                <input type="text" name="address" value="{{ employee.address }}"
                       class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <!-- Role -->
            <div>
                <label class="block text-gray-700 font-medium mb-1">Role</label>
                <select name="role" 
                        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    {% for key, value in employee.ROLE_CHOICES %}
                        <option value="{{ key }}" {% if employee.role == key %}selected{% endif %}>{{ value }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Submit Button -->
            <button type="submit"
                    class="w-full bg-green-600 text-white font-semibold py-3 rounded-lg shadow hover:bg-green-700 transition">
                Save Changes
            </button>

        </form>
    </div>
</div>

{% endblock %}
