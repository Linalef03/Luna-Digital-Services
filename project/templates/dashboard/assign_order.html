{% extends "base1.html" %}

{% block title %}Assign Order{% endblock %}

{% block content %}

<div class="flex justify-center items-start min-h-[60vh] p-6">

    <div class="w-full max-w-md bg-white shadow-xl rounded-2xl p-8">

        <!-- Page Title -->
        <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">
            Assign Order #{{ order.id }}
        </h1>

        <!-- Form -->
        <form method="post" class="space-y-5">
            {% csrf_token %}

            <!-- Employee Select -->
            <div>
                <label class="block text-gray-700 font-medium mb-2">Select Employee</label>
                <select name="employee" 
                        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    {% for emp in employees %}
                        <option value="{{ emp.id }}">{{ emp.username }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Submit Button -->
            <button type="submit"
                    class="w-full bg-blue-600 text-white font-semibold py-3 rounded-lg shadow hover:bg-blue-700 transition">
                Assign
            </button>
        </form>

    </div>
</div>

{% endblock %}
