{% extends "base1.html" %}

{% block title %}Delete Employee{% endblock %}

{% block content %}

<div class="flex justify-center items-center min-h-[60vh] p-6">

    <div class="w-full max-w-md bg-white shadow-xl rounded-2xl p-8 text-center">

        <!-- Title -->
        <h2 class="text-3xl font-bold text-gray-800 mb-6">Delete Employee</h2>

        <!-- Warning Message -->
        <p class="text-gray-700 mb-6">
            Are you sure you want to delete the employee 
            <strong>{{ employee.user.username }}</strong>?
        </p>

        <!-- Form -->
        <form method="POST" class="flex flex-col sm:flex-row justify-center gap-4">
            {% csrf_token %}
            <button type="submit"
                class="flex-1 bg-red-600 text-white font-semibold py-3 rounded-lg shadow hover:bg-red-700 transition">
                Yes, Delete
            </button>

            <a href="{% url 'dashboard:employees_list' %}"
               class="flex-1 bg-gray-300 text-gray-800 font-semibold py-3 rounded-lg shadow hover:bg-gray-400 transition">
               Cancel
            </a>
        </form>

    </div>

</div>

{% endblock %}
